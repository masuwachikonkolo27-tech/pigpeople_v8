<!DOCTYPE html>

<html>

<head>

<title>Pig People Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;

/* Colorful professional background */
background:linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


/* Login glass card */

.login-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}


/* Title */

.login-box h2{
margin-bottom:25px;
color:white;
}


/* Inputs */

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}


/* Button */

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#198754;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#157347;
}

</style>

</head>

<body>

<div class="login-box">

<h2>WELCOME TO PIG PEOPLE MANAGEMENT SYSTEM</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
