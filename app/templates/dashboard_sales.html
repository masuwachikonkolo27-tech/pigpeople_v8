{% extends "base.html" %}
{% block content %}
<h3>💰 Sales Records</h3>
<a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary mb-3">⬅ Back to Dashboard</a>

<table class="table table-dark table-striped">
<tr>
<th>Pig ID</th>
<th>Price</th>
<th>Entered By</th>
<th>Actions</th>
</tr>
{% for sale in sales %}
<tr>
<td>{{ sale.pig_id }}</td>
<td>ZMW {{ "{:,.2f}".format(sale.price) }}</td>
<td>{{ sale.entered_by }}</td>
<td>
<a href="{{ url_for('main.edit_sale', id=sale.id) }}" class="btn btn-sm btn-primary">Edit</a>
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
